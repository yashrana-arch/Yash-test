<!DOCTYPE html>
<html>
<head>
    <title>Yash Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .price {
            color: green;
            font-size: 20px;
        }

        button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }

        @media (max-width: 600px) {
            header {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

<header>🛒 Yash E-Commerce Store</header>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Product 1</h3>
        <p class="price">₹999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Product 2</h3>
        <p class="price">₹1499</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300">
        <h3>Product 3</h3>
        <p class="price">₹799</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
